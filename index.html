<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skipper Ventures LLC</title>
    <link rel="icon" href="public/assets/logo.png" type="image/png">   
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #050505;
            color: #ffffff;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100px 100px;
            pointer-events: none;
        }

        .company {
            position: absolute;
            top: 50px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 12px;
            text-transform: uppercase;
            opacity: 0.5;
            color: white;
        }

        .tagline-container {
            text-align: center;
        }

        .tagline {
            font-size: clamp(3rem, 12vw, 9rem);
            font-weight: 900;
            text-transform: uppercase;
            line-height: 0.85;
            display: block;
            font-family: 'Inter', 'Helvetica Neue', 'Arial Black', sans-serif;
            white-space: nowrap;
        }

        .tagline span {
            display: inline-block;
            text-shadow: 0 0 60px rgba(255,255,255,0.1);
        }

        .line-1 span:nth-child(1) { animation: float-1 4s ease-in-out infinite; }
        .line-1 span:nth-child(2) { animation: float-2 5s ease-in-out infinite 0.2s; }
        .line-1 span:nth-child(3) { animation: float-3 4.5s ease-in-out infinite 0.4s; }
        .line-1 span:nth-child(4) { animation: float-4 5.5s ease-in-out infinite 0.6s; }
        .line-1 span:nth-child(5) { animation: float-5 4.2s ease-in-out infinite 0.8s; }
        .line-1 span:nth-child(6) { animation: float-6 5.2s ease-in-out infinite 1s; }
        .line-1 span:nth-child(7) { animation: float-7 4.8s ease-in-out infinite 1.2s; }
        .line-1 span:nth-child(8) { animation: float-8 5.8s ease-in-out infinite 1.4s; }
        .line-1 span:nth-child(9) { animation: float-9 4.3s ease-in-out infinite 1.6s; }
        .line-1 span:nth-child(10) { animation: float-10 5.3s ease-in-out infinite 1.8s; }
        .line-1 span:nth-child(11) { animation: float-11 4.7s ease-in-out infinite 2s; }
        .line-1 span:nth-child(12) { animation: float-12 5.7s ease-in-out infinite 2.2s; }

        .line-2 { margin-top: 10px; }
        .line-2 span:nth-child(1) { animation: float-13 4.5s ease-in-out infinite 0.1s; opacity: 0.95; }
        .line-2 span:nth-child(2) { animation: float-14 5.5s ease-in-out infinite 0.3s; opacity: 0.9; }
        .line-2 span:nth-child(3) { animation: float-15 4.2s ease-in-out infinite 0.5s; opacity: 0.85; }
        .line-2 span:nth-child(4) { animation: float-16 5.2s ease-in-out infinite 0.7s; opacity: 0.8; }
        .line-2 span:nth-child(5) { animation: float-17 4.8s ease-in-out infinite 0.9s; opacity: 0.75; }
        .line-2 span:nth-child(6) { animation: float-18 5.8s ease-in-out infinite 1.1s; opacity: 0.7; }
        .line-2 span:nth-child(7) { animation: float-19 4.3s ease-in-out infinite 1.3s; opacity: 0.65; }
        .line-2 span:nth-child(8) { animation: float-20 5.3s ease-in-out infinite 1.5s; opacity: 0.6; }
        .line-2 span:nth-child(9) { animation: float-21 4.7s ease-in-out infinite 1.7s; opacity: 0.55; }
        .line-2 span:nth-child(10) { animation: float-22 5.7s ease-in-out infinite 1.9s; opacity: 0.5; }

        @keyframes float-1 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-8px, -6px) rotate(-1deg); } }
        @keyframes float-2 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(6px, 8px) rotate(1deg); } }
        @keyframes float-3 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-5px, 10px) rotate(-2deg); } }
        @keyframes float-4 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(10px, -5px) rotate(2deg); } }
        @keyframes float-5 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-7px, -8px) rotate(-1deg); } }
        @keyframes float-6 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(5px, 7px) rotate(1deg); } }
        @keyframes float-7 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-9px, 5px) rotate(-2deg); } }
        @keyframes float-8 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(7px, -9px) rotate(2deg); } }
        @keyframes float-9 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-6px, 6px) rotate(-1deg); } }
        @keyframes float-10 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(8px, -7px) rotate(1deg); } }
        @keyframes float-11 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-5px, -5px) rotate(-2deg); } }
        @keyframes float-12 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(9px, 8px) rotate(2deg); } }
        @keyframes float-13 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-12px, 4px) rotate(-2deg); } }
        @keyframes float-14 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(8px, -10px) rotate(2deg); } }
        @keyframes float-15 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-6px, 12px) rotate(-1deg); } }
        @keyframes float-16 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(11px, -6px) rotate(3deg); } }
        @keyframes float-17 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-8px, 8px) rotate(-2deg); } }
        @keyframes float-18 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(6px, -11px) rotate(1deg); } }
        @keyframes float-19 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-10px, 7px) rotate(-3deg); } }
        @keyframes float-20 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(7px, -8px) rotate(2deg); } }
        @keyframes float-21 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-9px, 10px) rotate(-1deg); } }
        @keyframes float-22 { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(12px, -5px) rotate(3deg); } }

        .collaborate-btn {
            margin-top: 100px;
            padding: 16px 40px;
            background: transparent;
            border: 2px solid #333;
            color: #888;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .collaborate-btn:hover {
            border-color: #fff;
            color: #fff;
            background: rgba(255,255,255,0.05);
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(255,255,255,0.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5,5,5,0.98);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #0a0a0a;
            border: 2px solid #222;
            padding: 50px;
            width: 90%;
            max-width: 480px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            background: none;
            border: none;
            color: #444;
            font-size: 28px;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #fff;
        }

        .modal h2 {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 35px;
            color: #666;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #444;
            margin-bottom: 10px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: #050505;
            border: 1px solid #1a1a1a;
            color: #fff;
            padding: 16px;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #444;
            background: #080808;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: #111;
            border: 2px solid #333;
            color: #666;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover:not(:disabled) {
            background: #1a1a1a;
            border-color: #555;
            color: #fff;
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .success-message, .error-message {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .success-message.active, .error-message.active {
            display: block;
        }

        .success-message p {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #666;
            line-height: 2;
        }

        .error-message p {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #844;
            line-height: 1.8;
        }

        .error-message button {
            margin-top: 20px;
            padding: 10px 24px;
            background: transparent;
            border: 1px solid #522;
            color: #844;
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .error-message button:hover {
            border-color: #844;
            color: #a66;
        }
    </style>
</head>
<body>
    <div class="company">Skipper Ventures LLC</div>
    
    <div class="tagline-container">
        <h1 class="tagline line-1">
            <span>D</span><span>E</span><span>C</span><span>E</span><span>N</span><span>T</span><span>R</span><span>A</span><span>L</span><span>I</span><span>Z</span><span>E</span>
        </h1>
        <h1 class="tagline line-2">
            <span>E</span><span>V</span><span>E</span><span>R</span><span>Y</span><span>T</span><span>H</span><span>I</span><span>N</span><span>G</span>
        </h1>
    </div>
    
    <button class="collaborate-btn" onclick="openModal()">Collaborate with us</button>
    
    <div class="modal" id="contactModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">×</button>
            
            <div id="formContainer">
                <h2>Contact Us</h2>
                <form id="contactForm" onsubmit="handleSubmit(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" required placeholder="you@domain.com">
                    </div>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="name" required placeholder="Satoshi Nakamoto">
                    </div>
                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" id="subject" required placeholder="Partnership Inquiry">
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea id="message" required placeholder="Your message..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn" id="submitBtn">Send</button>
                </form>
            </div>
            
            <div class="success-message" id="successMessage">
                <p>Thank you for contacting us. We will be in touch.</p>
                <p style="margin-top: 20px; font-size: 10px; color: #333;">Message sent to info@skipper.ventures</p>
            </div>

            <div class="error-message" id="errorMessage">
                <p>Transmission Failed</p>
                <p style="font-size: 10px; color: #555; margin-top: 10px;">Please try again or contact directly</p>
                <button onclick="resetForm()">Retry</button>
            </div>
        </div>
    </div>

    <script>
        emailjs.init("hrQYWVt0Qstn8p_kb");

        function openModal() {
            document.getElementById('contactModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            document.getElementById('contactModal').classList.remove('active');
            document.body.style.overflow = 'auto';
            setTimeout(() => {
                resetForm();
            }, 300);
        }

        function resetForm() {
            document.getElementById('contactForm').reset();
            document.getElementById('formContainer').style.display = 'block';
            document.getElementById('successMessage').classList.remove('active');
            document.getElementById('errorMessage').classList.remove('active');
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').textContent = 'Transmit';
        }
        
        function handleSubmit(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            
            const templateParams = {
                from_email: document.getElementById('email').value,
                name: document.getElementById('name').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value,
            };
            
            emailjs.send('service_cp0fb4i', 'template_cjmfzl6', templateParams)
                .then(function(response) {
                    console.log('SUCCESS!', response.status, response.text);
                    document.getElementById('formContainer').style.display = 'none';
                    document.getElementById('successMessage').classList.add('active');
                }, function(error) {
                    console.log('FAILED...', error);
                    document.getElementById('formContainer').style.display = 'none';
                    document.getElementById('errorMessage').classList.add('active');
                });
        }
        
        document.getElementById('contactModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
